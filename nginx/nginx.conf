# Reverse proxy for the VPS deploy (TZ 6.1: Nginx + HTTPS majburiy).
# HTTP works out of the box for first boot; switch to the HTTPS server block
# below once you have certificates (see README "Deploy" section for certbot).

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /content/ {
        proxy_pass http://backend:3001;
    }

    location /admin/ {
        proxy_pass http://admin:80/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

